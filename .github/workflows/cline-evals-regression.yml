name: Smoke Tests

on:
  push:
    branches: [master]
    paths:
      - 'src/core/**'
      - 'src/shared/**'
      - 'proto/**'
      - 'evals/**'
      - '.github/workflows/cline-evals-regression.yml'
  pull_request:
    paths:
      - 'src/core/**'
      - 'src/shared/**'
      - 'proto/**'
      - 'evals/**'
      - '.github/workflows/cline-evals-regression.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build protos
        run: npm run protos

      - name: Run smoke checks (core paths)
        run: |
          # Transitional smoke suite: legacy eval runner depends on removed `cline` CLI.
          # Keep CI signal alive with deterministic, fast checks over critical runtime paths.
          npm run test:unit -- \
            src/core/task/tools/handlers/__tests__/KillProcessToolHandler.test.ts \
            src/core/task/tools/handlers/__tests__/ListProcessesToolHandler.test.ts \
            src/integrations/checkpoints/__tests__/MultiRootCheckpointManager.test.ts

      - name: Generate summary
        if: always()
        run: |
          echo "## Smoke Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Mode: transitional core smoke checks" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage: tool handlers + checkpoint manager" >> $GITHUB_STEP_SUMMARY
          echo "- Legacy eval runner remains pending migration off removed cline CLI" >> $GITHUB_STEP_SUMMARY
