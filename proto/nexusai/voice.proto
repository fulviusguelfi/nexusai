syntax = "proto3";

package nexusai;

import "nexusai/common.proto";

option go_package = "github.com/fulviusguelfi/grpc-go/cline";
option java_multiple_files = true;
option java_package = "ai.nexusai.proto";

service VoiceService {
  rpc transcribeAudio(AudioChunk) returns (TranscriptionResult);
  rpc synthesizeSpeech(SynthesizeRequest) returns (SpeechResult);
  rpc getVoiceStatus(EmptyRequest) returns (VoiceStatus);
  rpc setVoiceSettings(VoiceSettings) returns (VoiceSettings);
}

message AudioChunk {
  bytes float32_pcm = 1;
  int32 sample_rate = 2;
}

message TranscriptionResult {
  string text = 1;
  float confidence = 2;
}

message SynthesizeRequest {
  string text = 1;
  optional string voice_id = 2;
  optional string language = 3;
}

message SpeechResult {
  string wav_base64 = 1;
}

message VoiceStatus {
  bool whisper_model_downloaded = 1;
  bool piper_binary_downloaded = 2;
  bool is_recording = 3;
  bool is_speaking = 4;
  string last_transcription = 5;
}

message VoiceSettings {
  string whisper_model = 1;
  string piper_voice = 2;
  float speed = 3;
}



